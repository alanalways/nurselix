# Schedule below is commented out. Manual workflow_dispatch retained for emergency.
name: Report Triage
on:
  # schedule:
    # Daily 04:00 UTC (台灣 12:00)
    # - cron: "0 4 * * *"
  workflow_dispatch: {}

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger triage
        run: |
          curl -fsSL --max-time 720 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/report-triage?limit=30&autoArchive=1"
