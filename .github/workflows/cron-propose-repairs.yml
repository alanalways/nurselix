name: Propose Repairs (verifier + repair agent)
on:
  schedule:
    # Daily 05:00 UTC (台灣 13:00) — runs after report-triage (04:00)
    - cron: "0 5 * * *"
  workflow_dispatch: {}

jobs:
  propose:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      # We call the endpoint multiple times with small batches.
      # Each call processes 3 CRITICAL issues (~90s) — well within Zeabur's
      # 5-min request timeout. Looping lets us chew through more per cron run.
      - name: Trigger repair proposal generation (batch loop)
        run: |
          for i in 1 2 3 4 5 6; do
            echo "=== batch $i ==="
            curl -fsSL --max-time 240 \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.APP_URL }}/api/cron/propose-repairs?limit=3" || echo "batch $i failed, continuing"
            sleep 5
          done
