# Schedule below is commented out. Manual workflow_dispatch retained for emergency.
name: Error Rate Recompute
on:
  # schedule:
    # Daily 05:00 UTC (台灣 13:00)
    # - cron: "0 5 * * *"
  workflow_dispatch: {}

jobs:
  recompute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger recompute
        run: |
          curl -fsSL --max-time 480 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/error-rate-recompute"
