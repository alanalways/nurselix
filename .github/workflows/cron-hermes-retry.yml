# MIGRATED 2026-05-01: scheduling moved to audit-worker/internal-scheduler.mjs
# Schedule below is commented out. Manual workflow_dispatch retained for emergency.
name: Hermes failed-job retry cron

on:
  # schedule:
    # Runs every 2 hours
    # - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Retry failed Hermes jobs
        # --max-time aligned with Zeabur HTTP timeout (5 min) and the
        # 4-min deadline guard inside the route. 290s gives a small buffer
        # for the response to flush before curl gives up.
        run: |
          STATUS=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            --max-time 290 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/admin/hermes/retry")
          cat /tmp/body.txt
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: endpoint returned HTTP $STATUS"
            exit 1
          fi
