name: Hourly finalize-abandoned-sessions cron

on:
  schedule:
    # Runs every hour at minute 15
    - cron: "15 * * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call finalize-abandoned-sessions endpoint
        run: |
          STATUS=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            --max-time 120 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/finalize-abandoned-sessions")
          cat /tmp/body.txt
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: endpoint returned HTTP $STATUS"
            exit 1
          fi
