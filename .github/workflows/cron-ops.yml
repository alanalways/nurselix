# Schedule below is commented out. Manual workflow_dispatch retained for emergency.
name: Daily ops report

on:
  # schedule:
    # Runs every day at 02:00 UTC (= 10:00 AM Taiwan time)
    # - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call ops report endpoint
        run: |
          STATUS=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            --max-time 480 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/ops")
          cat /tmp/body.txt
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: endpoint returned HTTP $STATUS"
            exit 1
          fi
